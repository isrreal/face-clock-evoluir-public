<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Faceclock Evoluir — System Architecture</title>
<desc>Structural diagram showing the Frontend, API, Services, ML, and Infrastructure layers</desc>

<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .ts  { font-size: 12px; font-weight: 400; fill: #555; }
  .arr { stroke: #999; stroke-width: 1.2; fill: none; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- FRONTEND -->
<rect x="40" y="30" width="600" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" x="340" y="62" text-anchor="middle">Frontend</text>
<text class="ts" x="340" y="82" text-anchor="middle">Browser / Totem — HTML5 · WebRTC · Geolocation API</text>

<line x1="340" y1="102" x2="340" y2="128" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="118">HTTPS + JWT</text>

<!-- API -->
<rect x="180" y="130" width="320" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" x="340" y="155" text-anchor="middle" fill="#26215C">FastAPI (async)</text>
<text class="ts" x="340" y="174" text-anchor="middle" fill="#534AB7">Routes · Auth (JWT/bcrypt) · Exception handlers</text>

<line x1="230" y1="186" x2="170" y2="248" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="186" x2="340" y2="248" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="186" x2="510" y2="248" class="arr" marker-end="url(#arrow)"/>

<!-- SERVICES -->
<rect x="40" y="250" width="180" height="68" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" x="130" y="274" text-anchor="middle" fill="#4A1B0C">Face Service</text>
<text class="ts" x="130" y="292" text-anchor="middle" fill="#993C1D">InsightFace buffalo_l</text>
<text class="ts" x="130" y="308" text-anchor="middle" fill="#993C1D">512-dim embeddings</text>

<rect x="250" y="250" width="180" height="68" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" x="340" y="274" text-anchor="middle" fill="#4A1B0C">Location Service</text>
<text class="ts" x="340" y="292" text-anchor="middle" fill="#993C1D">Haversine geofencing</text>
<text class="ts" x="340" y="308" text-anchor="middle" fill="#993C1D">GPS validation</text>

<rect x="460" y="250" width="180" height="68" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" x="550" y="274" text-anchor="middle" fill="#4A1B0C">Atestado Service</text>
<text class="ts" x="550" y="292" text-anchor="middle" fill="#993C1D">ML inference</text>
<text class="ts" x="550" y="308" text-anchor="middle" fill="#993C1D">OCR hybrid decision</text>

<line x1="130" y1="318" x2="130" y2="378" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="318" x2="340" y2="378" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="318" x2="550" y2="378" class="arr" marker-end="url(#arrow)"/>

<!-- ML / DATA -->
<rect x="40" y="380" width="180" height="68" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text class="th" x="130" y="404" text-anchor="middle" fill="#412402">pgvector</text>
<text class="ts" x="130" y="422" text-anchor="middle" fill="#854F0B">PostgreSQL extension</text>
<text class="ts" x="130" y="438" text-anchor="middle" fill="#854F0B">ANN similarity search</text>

<rect x="250" y="380" width="180" height="68" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text class="th" x="340" y="404" text-anchor="middle" fill="#412402">OpenCV</text>
<text class="ts" x="340" y="422" text-anchor="middle" fill="#854F0B">Base64 decode</text>
<text class="ts" x="340" y="438" text-anchor="middle" fill="#854F0B">BGR → RGB</text>

<rect x="460" y="380" width="180" height="68" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text class="th" x="550" y="404" text-anchor="middle" fill="#412402">EfficientNet-B0</text>
<text class="ts" x="550" y="422" text-anchor="middle" fill="#854F0B">PyTorch fine-tune</text>
<text class="ts" x="550" y="438" text-anchor="middle" fill="#854F0B">+ pytesseract OCR</text>

<line x1="130" y1="448" x2="200" y2="508" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="448" x2="340" y2="508" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="448" x2="480" y2="508" class="arr" marker-end="url(#arrow)"/>

<!-- INFRA -->
<rect x="40" y="510" width="600" height="72" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text class="th" x="340" y="542" text-anchor="middle" fill="#2C2C2A">Infrastructure</text>
<text class="ts" x="340" y="562" text-anchor="middle" fill="#5F5E5A">Docker Compose · PostgreSQL · Alembic migrations · TLS</text>
</svg>